map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       5173;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # WebSocket 转发：前端 /api/ws/* -> 后端 /api/ws/*
    location ^~ /api/ws/ {
        proxy_pass https://subaru-pic-backend-247075-4-1422702638.sh.run.tcloudbase.com;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;

        proxy_set_header Host subaru-pic-backend-247075-4-1422702638.sh.run.tcloudbase.com;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # HTTP API 转发：前端 /api/* -> 后端 /api/*
    location ^~ /api/ {
        proxy_pass https://subaru-pic-backend-247075-4-1422702638.sh.run.tcloudbase.com;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;

        proxy_set_header Host subaru-pic-backend-247075-4-1422702638.sh.run.tcloudbase.com;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_intercept_errors off;
    }

    # SPA 回退：防止刷新子路由 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
